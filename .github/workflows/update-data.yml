name: Update MEV Watch data

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update data
        run: pnpm update-data
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}

      - name: Validate generated data
        run: pnpm test src/lib/build-path.test.ts src/lib/mev-watch-data.test.ts src/lib/mev-watch-generator.test.ts src/config/relays.test.ts src/lib/queries.test.ts

      - name: Commit data changes
        run: |
          if git diff --quiet -- src/data/mev-watch.json; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/mev-watch.json
          git commit -m "chore: update mev watch data"
          git push
